<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa Primate - Veto System</title>
    <link rel="stylesheet" href="style.css">
    <style>
    /* --- MULTIPLAYER SYNC PANEL --- */
    .sync-panel {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 300px;
    background: rgba(15, 15, 30, 0.95);
    backdrop-filter: blur(10px);
    border: 1px solid var(--omen-cyan);
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    display: none;
    z-index: 9999;
    flex-direction: column;
}
.sync-panel.active {
    display: flex !important;
}
.sync-toggle-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: var(--omen-deep);
    border: 2px solid var(--omen-cyan);
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    z-index: 9999;
    transition: 0.3s;
    display: flex;
    justify-content: center;
    align-items: center;
}
.sync-toggle-btn:hover {
    transform: scale(1.1);
    background: var(--omen-cyan);
    </style>
</head>
<body class="layout-centrado"> <div class="noise-overlay"></div>
<div class="omen-bg">
    <div class="bg-energy-core"></div>
</div>

<div id="app-container">
    <header class="main-header" id="header-app">
        <h1 class="titulo-principal" id="titulo-fase">COPA PRIMATE</h1>
        <div id="instruccion" class="vol-text">ELIGE EL FORMATO</div>
    </header>

    <main class="main-content" id="contenedor-principal">
        </main>

    <footer class="footer-controls" id="footer-ui" style="display: none;">
        <button class="btn-valorant" id="btn-lanzar">
            <span class="btn-content">COMENZAR VETO 🐵</span>
        </button>
    </footer>
</div>

<div id="syncPanel" class="sync-panel">
    <h3 style="font-family:'BertholdBlock'; color:var(--omen-cyan); font-size:1.5rem; margin-bottom:10px;">📡 SYNC MQTT</h3>
    <p style="font-family:'Inter', sans-serif; font-size:0.9rem; opacity:0.8; margin-bottom:5px;">Sala de sincronización:</p>
    <input type="text" id="syncRoomInput" readonly style="width:100%; padding:8px; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.2); color:white; font-family:'BertholdBlock'; font-size:1.2rem; text-align:center; margin-bottom:15px; border-radius:5px; outline:none;" onclick="this.select();">
    <button class="btn-valorant" id="btnSyncCopyLink" style="margin:5px 0; width:100%;" onclick="copiarEnlace()">
        <span class="btn-content" style="padding: 10px; font-size: 1rem; clip-path:none; border-radius:5px;" id="btnSyncCopyLinkSpan">COPIAR ENLACE ESPECTADOR</span>
    </button>
    <button class="btn-valorant" id="btnSyncClose" style="margin:5px 0; width:100%;" onclick="document.getElementById('syncPanel').classList.remove('active')">
        <span class="btn-content" style="padding: 10px; font-size: 1rem; background: #333; clip-path:none; border-radius:5px;">CERRAR</span>
    </button>
</div>
<button id="syncToggleBtn" class="sync-toggle-btn" title="Menú Multijugador" onclick="mostrarPanelSync()">📡</button>

<script>
    function mostrarPanelSync() {
        if (window.isPantalla) return;
        document.getElementById('syncPanel').classList.toggle('active');
        const input = document.getElementById('syncRoomInput');
        if (input) input.value = window.roomName || '';
    }

    function copiarEnlace() {
        const input = document.getElementById('syncRoomInput');
        const room = input ? input.value.trim() : '';
        const shareUrl = `${window.location.origin}${window.location.pathname}?room=${encodeURIComponent(room)}`;
        
        const span = document.getElementById('btnSyncCopyLinkSpan');
        const orig = span ? span.innerHTML : '';

        const successUI = () => {
            if (span) {
                span.innerHTML = '✓ ¡COPIADO!';
                span.style.background = 'var(--omen-cyan)';
                span.style.color = 'black';
                setTimeout(() => { 
                    span.innerHTML = orig; 
                    span.style.background = '';
                    span.style.color = 'white';
                }, 2000);
            }
        };

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(shareUrl).then(successUI).catch(err => {
                fallbackCopy(shareUrl, successUI);
            });
        } else {
            fallbackCopy(shareUrl, successUI);
        }
    }

    function fallbackCopy(text, successCallback) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-999999px";
        document.body.appendChild(textArea);
        textArea.select();
        try {
            document.execCommand('copy');
            successCallback();
        } catch (err) {
            prompt('Pulsa Ctrl+C o Cmd+C para copiar el enlace:', text);
        }
        document.body.removeChild(textArea);
    }
</script>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="script.js?v=2"></script>
</body>
</html>
